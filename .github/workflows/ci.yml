name: Todo API CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: todo_test
      DB_USER: todo_user
      DB_PASSWORD: todo_pass
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  build-and-push:
    needs: [test-unit, test-integration]
    runs-on: ubuntu-latest
    if: github.ref_name == 'master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          docker build -t ${{ secrets.DOCKERHUB_USER }}/todo-api:$SHORT_SHA -t ${{ secrets.DOCKERHUB_USER }}/todo-api:latest .

      - name: Push Docker image
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          docker push ${{ secrets.DOCKERHUB_USER }}/todo-api:$SHORT_SHA
          docker push ${{ secrets.DOCKERHUB_USER }}/todo-api:latest
