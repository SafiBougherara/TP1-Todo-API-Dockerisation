version: '3.8'

services:
  web:
    build: ../../
    ports:
      - "3000:3000"
    # Modification : dépendance stricte attendant que Postgres soit sain/prêt
    depends_on:
      database:
        condition: service_healthy
    environment:
      - DB_HOST=database   # Correction : match le nom du service BDD 'database' (et non 'postgres')
      - DB_PORT=5432
      - DB_NAME=todo_db
      - DB_USER=todo_user
      - DB_PASSWORD=todo_pass

  database:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=todo_db
      - POSTGRES_USER=todo_user
      - POSTGRES_PASSWORD=todo_pass  # Correction : variables PostgreSQL requises définies
    # Ajout du healthcheck Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_user -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
