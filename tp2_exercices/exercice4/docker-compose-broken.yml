version: '3.8'

services:
  web:
    build: ../../
    ports:
      - "3000:3000"
    depends_on:
      - database
    environment:
      DB_HOST: postgres
      DB_PORT: 5432

  database:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: secret
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
